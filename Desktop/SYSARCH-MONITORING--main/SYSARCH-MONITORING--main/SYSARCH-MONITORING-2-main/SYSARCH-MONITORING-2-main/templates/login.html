{% extends "base.html" %}
{% block title %}Login – CCS Monitoring{% endblock %}
{% block content %}
<style>
body {
  background-image: url('/static/images/login-bg.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}
.login-main {
  background: none !important;
}
</style>
<div class="login-main">
  <div class="login-card">
    <div class="logo-area">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="CCS Logo" style="width:140px;height:140px;object-fit:contain;"/>
    </div>
    <div class="form-side">
      <form method="post" action="{{ url_for('login') }}">
        <div class="login-field">
          <input type="text" name="id_number" placeholder="ID Number" required/>
        </div>
        <div class="login-field">
          <input type="password" name="password" id="login-pw" placeholder="Password" required/>
          <button type="button" onclick="togglePw('login-pw', this)" class="show-pw-btn">Show password</button>
        </div>
        <div class="row-opts">
          <label><input type="checkbox" name="remember"/> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
      </form>
      <p class="signup-link">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
    </div>
  </div>
</div>
<script>
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? 'Show password' : 'Hide password';
  }
</script>
{% endblock %}
